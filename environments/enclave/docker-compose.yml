version: "3.8"

# Oyster CVM deployment config. `image` MUST be an immutable @sha256 digest that is
# public/pullable by the operator. After `docker build && docker push`, repin it with:
#   DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' <repo>:<tag>)
#   sed -i '' "s#^[[:space:]]*image:.*#    image: ${DIGEST}#" docker-compose.yml
# Default is the known-good Polius attestation image (pubkey 0x03a7e8fe…566…7f50).
services:
  polius-enclave:
    image: albeit3405/pollius@sha256:c15273553c2eaf28c23c92460e11f4be683f7f7fca9fcf79852178d9fa8a20e2
    container_name: polius-enclave
    restart: unless-stopped
    init: true
    network_mode: host
    volumes:
      - /app/ecdsa.sec:/app/ecdsa.sec:ro
